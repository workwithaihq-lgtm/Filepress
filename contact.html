<!DOCTYPE html>
<html>
<head>
<title>Contact</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white text-center">

<h1 class="mt-10 text-3xl">Contact Us</h1>

<form class="mt-6">
  <input type="text" placeholder="Your Name" class="p-2 mb-3 text-black rounded"><br>
  <input type="email" placeholder="Email" class="p-2 mb-3 text-black rounded"><br>
  <textarea placeholder="Message" class="p-2 text-black rounded"></textarea><br>

  <button class="bg-blue-500 px-4 py-2 mt-3 rounded">
    Send Message
  </button>
</form>

</body>
</html>
