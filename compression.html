<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Compress Images</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white">

<nav class="p-4 flex justify-between bg-gray-800">
  <h1 class="font-bold text-xl">QuickCompress</h1>
  <div>
    <a href="index.html" class="nav-link">Home</a>
    <a href="compress.html" class="nav-link">Compress</a>
    <a href="convert.html" class="nav-link">Convert</a>
    <a href="about.html" class="nav-link">About</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<div class="flex flex-col items-center mt-16">
  <h1 class="text-2xl mb-4">Image Compressor</h1>

  <input type="file" id="fileInput" class="mb-4 text-black p-2 rounded">

  <button onclick="uploadImage()" class="bg-blue-500 px-4 py-2 rounded">
    Compress Image
  </button>

  <p id="status" class="mt-4"></p>

  <img id="preview" class="hidden mt-4 w-64">
  <a id="download" class="hidden text-green-400 mt-2">Download</a>
</div>

<script>
async function uploadImage() {
  const file = document.getElementById("fileInput").files[0];
  const status = document.getElementById("status");

  if (!file) return status.innerText = "Select a file";

  status.innerText = "Compressing...";

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "qhtiqzr0");

  const res = await fetch("https://api.cloudinary.com/v1_1/dwomffcf4/image/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();
  const optimized = data.secure_url.replace("/upload/", "/upload/q_auto,f_auto/");

  preview.src = optimized;
  preview.classList.remove("hidden");

  download.href = optimized;
  download.innerText = "Download";
  download.classList.remove("hidden");

  status.innerText = "Done!";
}
</script>

</body>
</html>
