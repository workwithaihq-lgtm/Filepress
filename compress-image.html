<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Matrix | OptiStream</title>
<link rel="stylesheet" href="/style.css">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-[#0a0f1c] dark:text-gray-100 min-h-screen flex flex-col">

<header class="glass-nav sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
    <a href="/" class="font-black text-xl text-gray-500 hover:text-blue-500">← Back to Hub</a>
    <div class="bg-blue-100 dark:bg-blue-900/20 text-blue-700 dark:text-blue-400 px-3 py-1.5 rounded-lg text-sm font-bold border border-blue-200 dark:border-blue-800/50">
        ⚡ <span id="creditCounter">5</span> Credits
    </div>
  </div>
</header>

<main class="flex-grow w-full max-w-2xl mx-auto px-4 mt-12">
  <h1 class="text-4xl font-black mb-2">Image Matrix</h1>
  <p class="text-gray-500 text-sm mb-8">Reduce payload size via Cloudinary AI routing.</p>

  <div class="bg-white dark:bg-[#111827] p-8 rounded-2xl border border-gray-200 dark:border-gray-800">
    <div class="file-drop-zone mb-6" onclick="document.getElementById('fileInput').click()">
      <div class="text-4xl mb-2">🖼️</div>
      <p class="font-bold">Mount Image</p>
      <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="document.getElementById('fileName').innerText = this.files[0].name; document.getElementById('fileName').classList.remove('hidden');">
    </div>
    
    <p id="fileName" class="text-sm text-blue-500 font-bold mb-6 hidden text-center truncate"></p>

    <button onclick="executeTool(1, this, runCompression)" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-lg font-bold">
      Execute (-1 Credit)
    </button>
  </div>
</main>

<script src="/core.js"></script>
<script>
async function runCompression() {
    const file = document.getElementById("fileInput").files[0];
    if (!file) { showToast("Mount file payload.", "error"); return false; }
    
    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", "qhtiqzr0");

    try {
      const res = await fetch("https://api.cloudinary.com/v1_1/dwomffcf4/image/upload", { method: "POST", body: formData });
      if(!res.ok) throw new Error("API Reject");
      
      const data = await res.json();
      const optimizedUrl = data.secure_url.replace("/upload/", `/upload/q_auto,f_auto,fl_attachment:OptiStream_${file.name.split('.')[0]}/`);
      
      showToast("Optimization Complete", "success");
      
      // Use core.js function to trigger download and show Ad
      triggerDownload(optimizedUrl, `OptiStream_${file.name}`);
      return true;
    } catch (err) {
      return false; 
    }
}
</script>
</body>
</html>
