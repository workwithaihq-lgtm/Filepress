<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Engine | OptiStream</title>
<link rel="stylesheet" href="/style.css">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-[#0a0f1c] dark:text-gray-100 min-h-screen flex flex-col">

<header class="glass-nav sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
    <a href="/" class="font-black text-xl text-gray-500 hover:text-red-500">← Back to Hub</a>
    <div class="bg-blue-100 dark:bg-blue-900/20 text-blue-700 dark:text-blue-400 px-3 py-1.5 rounded-lg text-sm font-bold border border-blue-200 dark:border-blue-800/50">
        ⚡ <span id="creditCounter">5</span> Credits
    </div>
  </div>
</header>

<main class="flex-grow w-full max-w-2xl mx-auto px-4 mt-12">
  <div class="flex justify-between items-end mb-2">
    <h1 class="text-4xl font-black">Video Engine</h1>
    <span class="bg-red-900/50 text-red-400 px-3 py-1 rounded-lg font-bold text-xs border border-red-800">2 Credits</span>
  </div>
  <p class="text-gray-500 text-sm mb-8">Transcode MP4/WEBM payloads via WASM memory buffers.</p>

  <div class="bg-white dark:bg-[#111827] p-8 rounded-2xl border border-gray-200 dark:border-gray-800">
    <div class="file-drop-zone mb-6" onclick="document.getElementById('fileInput').click()">
      <div class="text-4xl mb-2">🎞️</div>
      <p class="font-bold">Mount Video</p>
      <input type="file" id="fileInput" accept="video/mp4,video/webm" class="hidden" onchange="document.getElementById('fileName').innerText = this.files[0].name; document.getElementById('fileName').classList.remove('hidden');">
    </div>
    
    <p id="fileName" class="text-sm text-red-500 font-bold mb-6 hidden text-center truncate"></p>

    <button onclick="executeTool(2, this, runVideoCompression)" class="w-full bg-red-600 hover:bg-red-700 text-white py-4 rounded-lg font-bold">
      Execute Transcode (-2 Credits)
    </button>
  </div>
</main>

<script src="/core.js"></script>
<script>
// NOTE: True FFmpeg.wasm requires explicit Cross-Origin-Isolation headers on your Vercel server.
// Until configured, this simulates the local video processing delay and tests the 2-credit deduction logic.
function runVideoCompression() {
    return new Promise((resolve, reject) => {
        const file = document.getElementById("fileInput").files[0];
        if (!file) { showToast("Mount video payload.", "error"); resolve(false); return; }
        
        showToast("Allocating WASM memory buffers...", "success");
        
        // Simulate heavy processing time (4 seconds)
        setTimeout(() => {
            showToast("Transcoding Complete", "success");
            // Simulate Download
            const fakeBlob = new Blob(["Simulated Video Data"], { type: file.type });
            const url = URL.createObjectURL(fakeBlob);
            triggerDownload(url, `OptiStream_${file.name}`);
            resolve(true); // Returns true to deduct 2 credits
        }, 4000);
    });
}
</script>
</body>
</html>
