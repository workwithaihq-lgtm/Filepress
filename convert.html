<!DOCTYPE html>
<html>
<head>
<title>Convert Image</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white text-center">

<nav class="p-4 flex justify-between bg-gray-800">
  <h1 class="font-bold">QuickCompress</h1>
</nav>

<h1 class="mt-10">Convert Image</h1>

<input type="file" id="file">
<select id="format">
  <option value="image/jpeg">JPG</option>
  <option value="image/png">PNG</option>
</select>

<button onclick="convert()">Convert</button>

<img id="output" class="hidden mt-4 w-64">
<a id="download" class="hidden text-green-400">Download</a>

<script>
function convert() {
  const file = document.getElementById("file").files[0];
  const format = document.getElementById("format").value;

  const img = new Image();
  img.src = URL.createObjectURL(file);

  img.onload = () => {
    const canvas = document.createElement("canvas");
    canvas.width = img.width;
    canvas.height = img.height;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0);

    const result = canvas.toDataURL(format, 0.7);

    output.src = result;
    output.classList.remove("hidden");

    download.href = result;
    download.innerText = "Download";
    download.classList.remove("hidden");
  };
}
</script>

</body>
</html>
